name: Deploy Next.js Portfolio to Pages

on:
  push:
    branches: ["main"] # Change this to "master" if your default branch uses it
  workflow_dispatch:   # Allows manual trigger from the Actions tab

# Set permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build_and_deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: ${{ hashFiles('package-lock.json') != '' && 'npm' || hashFiles('yarn.lock') != '' && 'yarn' || 'pnpm' }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install Dependencies
        run: |
          if [ -f "package-lock.json" ]; then npm ci;
          elif [ -f "yarn.lock" ]; then yarn install --frozen-lockfile;
          elif [ -f "pnpm-lock.yaml" ]; then corepack enable pnpm && pnpm install --frozen-lockfile;
          else npm install;
          fi

      - name: Build Next.js Static Site
        run: |
          if [ -f "package-lock.json" ]; then npm run build;
          elif [ -f "yarn.lock" ]; then yarn build;
          elif [ -f "pnpm-lock.yaml" ]; then pnpm build;
          else npm run build;
          fi

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out # Next.js outputs static files into the 'out' directory

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4